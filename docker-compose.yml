services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: nis_signin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  server:
    build:
      context: ./server
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nis_signin
      JWT_SECRET: dev_jwt_secret
      DAILY_REPORT_ENABLED: ${DAILY_REPORT_ENABLED:-true}
      DAILY_REPORT_TIME: ${DAILY_REPORT_TIME:-17:00}
      REPORT_TIMEZONE: ${REPORT_TIMEZONE:-America/New_York}
      DAILY_REPORT_CHECK_INTERVAL_MS: ${DAILY_REPORT_CHECK_INTERVAL_MS:-60000}
    ports:
      - "3001:3001"
    depends_on:
      - db
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
    environment:
      VITE_API_BASE_URL: ""
      VITE_PROXY_TARGET: http://server:3001
    ports:
      - "5173:5173"
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  postgres_data:
